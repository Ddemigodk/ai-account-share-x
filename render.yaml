services:
  - type: web
    name: ai-account-share
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-share-db
          property: connectionString
      - key: APP_SECRET
        generateValue: true
      - key: APP_ID
        generateValue: true
      - key: VITE_APP_ID
        generateValue: true
      - key: PORT
        value: 3000

databases:
  - name: ai-share-db
    plan: free
